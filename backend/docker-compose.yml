services:
  app:
    build: .
    container_name: ecobottle-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: ecobottle-db
    environment:
      POSTGRES_DB: ecobottle
      POSTGRES_USER: ecobottle
      POSTGRES_PASSWORD: ecobottle_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ecobottle-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
